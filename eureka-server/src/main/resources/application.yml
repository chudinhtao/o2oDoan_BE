server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # Eureka server không tự đăng ký với chính mình
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Không đợi sync khi start (dev mode)
    wait-time-in-ms-when-sync-empty: 0
    # Tắt eviction để máy local không bị miss heartbeat
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
