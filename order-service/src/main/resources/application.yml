server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:fnb_db}?currentSchema=orders&TimeZone=UTC"
    username: ${DB_USER:fnb_user}
    password: ${DB_PASS:fnb_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: orders
    open-in-view: false

  flyway:
    enabled: true
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:fnb_db}?TimeZone=UTC"
    user: ${DB_USER:fnb_user}
    password: ${DB_PASS:fnb_pass}
    schemas: orders
    locations: classpath:db/migration
    create-schemas: true
    baseline-on-migrate: true
    baseline-version: 1
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:fnb-self-ordering-super-secret-key-must-be-at-least-256bits-long}
  expiration: 86400000

app:
  qr-base-url: ${QR_BASE_URL:}

payos:
  client-id: "${PAYOS_CLIENT_ID:}"
  api-key: "${PAYOS_API_KEY:}"
  checksum-key: "${PAYOS_CHECKSUM_KEY:}"
