server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:fnb_db}?currentSchema=auth&TimeZone=UTC"
    username: ${DB_USER:fnb_user}
    password: ${DB_PASS:fnb_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth    # Mọi entity mặc định tìm trong schema auth

  flyway:
    enabled: true
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:fnb_db}?TimeZone=UTC"
    user: ${DB_USER:fnb_user}
    password: ${DB_PASS:fnb_pass}
    schemas: auth
    locations: classpath:db/migration
    create-schemas: true
    baseline-on-migrate: true
    baseline-version: 0

# ─── JWT — dùng cùng secret với api-gateway ──────────────────────────
jwt:
  secret: ${JWT_SECRET:}
  expiry: 3600           # 1 giờ
  refresh-expiry: 604800 # 7 ngày

# ─── Eureka ───────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

# ─── Logging ──────────────────────────────────────────────────────────
logging:
  level:
    com.fnb.auth: DEBUG

# ─── Actuator ─────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
